<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0">
</head>
<body>
  <script>
    var r = "http://43.130.231.67/api";
    // 优先从 URL 参数获取 code
    var code = new URLSearchParams(location.search).get("code");
    if (!code) {
      // 如果没有参数，尝试从路径获取
      var path = location.pathname;
      var lastSlashIndex = path.lastIndexOf("/r/");
      code = lastSlashIndex !== -1 ? path.substring(lastSlashIndex + 3) : null;
    }
    if (code) {
      fetch(r.replace("/api", "") + "/r/" + code)
        .then(function(response) {
          if (response.redirected && response.url) {
            location.replace(response.url);
          } else {
            return response.json().then(function(d) {
              if (d && d.data && d.data.targetUrl) {
                location.replace(d.data.targetUrl);
              }
            });
          }
        })
        .catch(function() {
          location.replace("https://www.baidu.com");
        });
    }
  </script>
</body>
</html>
