<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加载中...</title>
</head>
<body>
  <script>
    (function() {
      var params = new URLSearchParams(location.search);
      var code = params.get('code');
      var apiBase = params.get('api') || window.FANGHONG_API_BASE || 'http://43.130.231.67';

      if (!code) {
        var path = location.pathname;
        var marker = '/r/';
        var markerIndex = path.lastIndexOf(marker);
        code = markerIndex !== -1 ? path.substring(markerIndex + marker.length).replace(/\/+$/, '') : '';
      }

      if (!code) {
        document.body.innerHTML = '<p style="text-align:center;padding:50px;">链接无效</p>';
        return;
      }

      fetch(apiBase.replace(/\/+$/, '') + '/r/' + encodeURIComponent(code) + '?stage=entry&format=json', {
        headers: {
          Accept: 'application/json'
        }
      })
        .then(function(response) {
          if (!response.ok) {
            throw new Error('入口链接不存在或已失效');
          }
          return response.json();
        })
        .then(function(result) {
          var nextUrl = result && result.data && result.data.nextUrl;
          if (!nextUrl) {
            throw new Error('入口跳转地址缺失');
          }
          location.replace(nextUrl);
        })
        .catch(function() {
          location.replace('https://www.baidu.com');
        });
    })();
  </script>
</body>
</html>
