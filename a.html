<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0">
</head>
<body>
  <script>
    var r = "http://43.130.231.67/api";
    // 支持两种格式: /r/CODE 和 ?code=CODE
    var code = location.pathname.replace("/r/", "").replace(/\//g, "") || new URLSearchParams(location.search).get("code");
    if (code) {
      fetch(r.replace("/api", "") + "/r/" + code)
        .then(function(s) { return s.json(); })
        .then(function(d) {
          if (d && d.data && d.data.targetUrl) {
            location.replace(d.data.targetUrl);
          }
        })
        .catch(function() {
          location.replace("https://www.baidu.com");
        });
    }
  </script>
</body>
</html>
